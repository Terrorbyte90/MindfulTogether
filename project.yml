name: MindfulTogether
options:
  bundleIdPrefix: com.mindfultogether
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  MindfulTogether:
    type: application
    platform: iOS
    sources:
      - path: MindfulTogether
        excludes:
          - "*.xcodeproj"
          - "*.xcworkspace"
      - path: Sources
        group: Sources
    settings:
      base:
        INFOPLIST_FILE: MindfulTogether/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.mindfultogether.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
    info:
      path: MindfulTogether/Info.plist
      properties:
        CFBundleDisplayName: MindfulTogether
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDefault

schemes:
  MindfulTogether:
    build:
      targets:
        MindfulTogether: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release